<app-admin-navbar></app-admin-navbar>

<div class="container mt-5">

    <h2 class="text-center mb-4">Admin Dashboard</h2>

    <!-- Dashboard Cards -->

    <div class="row mb-4">

        <div class="col-md-3">

            <div
                class="card text-white bg-primary shadow"
                style="cursor: pointer;"
            >

                <div class="card-body">

                    <h5>Total Loans</h5>

                    <h3>{{ totalLoans }}</h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div
                class="card text-white bg-success shadow"
                style="cursor: pointer;"
            >

                <div class="card-body">

                    <h5>Approved</h5>

                    <h3>{{ approvedLoans }}</h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div
                class="card text-dark bg-warning shadow"
                style="cursor: pointer;"
            >

                <div class="card-body">

                    <h5>Pending</h5>

                    <h3>{{ pendingLoans }}</h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div
                class="card text-white bg-danger shadow"
                style="cursor: pointer;"
            >

                <div class="card-body">

                    <h5>Rejected</h5>

                    <h3>{{ rejectedLoans }}</h3>

                </div>

            </div>

        </div>

    </div>

    <!-- Loan Table -->

    <div class="table-responsive">

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>User ID</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let loan of loans">

                <td>{{ loan.id }}</td>

                <td>{{ loan.userId }}</td>

                <td>{{ loan.amount }}</td>

                <td>

                    <span
                        class="badge"
                        [ngClass]="{
                            'bg-success': loan.status === 'APPROVED',
                            'bg-danger': loan.status === 'REJECTED',
                            'bg-warning text-dark': loan.status === 'PENDING'
                        }"
                    >

                        {{ loan.status }}

                    </span>

                </td>

                <td>

                    <div *ngIf="loan.status === 'PENDING'">

                        <button
                            class="btn btn-success btn-sm me-2"
                            (click)="approveLoan(loan.id)"
                        >
                            Approve
                        </button>

                        <button
                            class="btn btn-danger btn-sm"
                            (click)="rejectLoan(loan.id)"
                        >
                            Reject
                        </button>

                    </div>

                </td>

            </tr>

        </tbody>

    </table>

    </div>

</div>
