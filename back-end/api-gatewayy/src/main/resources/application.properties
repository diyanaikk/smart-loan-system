
server.port=9090

spring.application.name=API-GATEWAY

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
##connects to eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# USER SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# LOAN SERVICE
spring.cloud.gateway.routes[1].id=loan-service
spring.cloud.gateway.routes[1].uri=lb://LOAN-SERVICEE
spring.cloud.gateway.routes[1].predicates[0]=Path=/loans/**

# CREDIT SERVICE
spring.cloud.gateway.routes[2].id=credit-service
spring.cloud.gateway.routes[2].uri=lb://CREDIT-SCORE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/credit/**

# PAYMENT SERVICE
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/pay/**

# NOTIFICATION SERVICE
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICEE
spring.cloud.gateway.routes[4].predicates[0]=Path=/notify/**

# AUTH ROUTE
spring.cloud.gateway.routes[5].id=auth-route
spring.cloud.gateway.routes[5].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/auth/**

# SWAGGER DOCS ROUTES

# USER SWAGGER
spring.cloud.gateway.routes[6].id=user-swagger
spring.cloud.gateway.routes[6].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/user-service/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/user-service/(?<segment>.*), /$\{segment}
# LOAN SWAGGER
spring.cloud.gateway.routes[7].id=loan-swagger
spring.cloud.gateway.routes[7].uri=lb://LOAN-SERVICEE
spring.cloud.gateway.routes[7].predicates[0]=Path=/loan-service/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/loan-service/(?<segment>.*), /$\{segment}
# CREDIT SWAGGER
spring.cloud.gateway.routes[8].id=credit-swagger
spring.cloud.gateway.routes[8].uri=lb://CREDIT-SCORE-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/credit-score-service/v3/api-docs
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/credit-score-service/(?<segment>.*), /$\{segment}
# PAYMENT SWAGGER
spring.cloud.gateway.routes[9].id=payment-swagger
spring.cloud.gateway.routes[9].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/payment-service/(?<segment>.*), /$\{segment}
# NOTIFICATION SWAGGER
spring.cloud.gateway.routes[10].id=notification-swagger
spring.cloud.gateway.routes[10].uri=lb://NOTIFICATION-SERVICEE
spring.cloud.gateway.routes[10].predicates[0]=Path=/notification-service/v3/api-docs
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/notification-service/(?<segment>.*), /$\{segment}
##
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=Loan Service
springdoc.swagger-ui.urls[1].url=/loan-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=Credit Service
springdoc.swagger-ui.urls[2].url=/credit-score-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=Payment Service
springdoc.swagger-ui.urls[3].url=/payment-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=Notification Service
springdoc.swagger-ui.urls[4].url=/notification-service/v3/api-docs

#lb is load-balanced service call via eureka
#instead of localhost:8081, we use lb://user-servce

springdoc.swagger-ui.disable-swagger-default-url=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html


spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*