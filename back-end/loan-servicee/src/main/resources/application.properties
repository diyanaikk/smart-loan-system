spring.application.name=LOAN-SERVICEE

# DB connection
spring.datasource.url=jdbc:mysql://localhost:3306/loan_db
#this DB shall be used

spring.datasource.username=root
spring.datasource.password=your_password

# JPA settings
spring.jpa.hibernate.ddl-auto=update
#auto creates table

spring.jpa.show-sql=true
#shows query in console

# Server port (different from user-service)
server.port=8082
#different port no to avoid clash with user-service	

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true


spring.main.allow-circular-references=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true